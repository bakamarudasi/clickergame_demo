<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 24" preserveAspectRatio="none">
  <!-- Front face: lighter wood -->
  <rect x="0" y="6" width="480" height="14" fill="#7A4A22"/>
  <!-- Top edge highlight -->
  <rect x="0" y="6" width="480" height="3" fill="#C68A52" opacity="0.85"/>
  <!-- Bottom shadow lip -->
  <rect x="0" y="20" width="480" height="4" fill="#2A1808" opacity="0.6"/>
  <!-- Subtle grain streaks along front face -->
  <g fill="#5A3416" opacity="0.45">
    <rect x="20" y="11" width="68" height="0.8"/>
    <rect x="120" y="13" width="92" height="0.7"/>
    <rect x="240" y="10" width="84" height="0.9"/>
    <rect x="350" y="14" width="74" height="0.7"/>
    <rect x="60" y="16" width="56" height="0.8"/>
    <rect x="200" y="17" width="80" height="0.7"/>
    <rect x="320" y="18" width="100" height="0.6"/>
  </g>
  <!-- Cast shadow under the shelf (below the board) -->
  <rect x="0" y="0" width="480" height="5" fill="#1A0E04" opacity="0.35"/>
</svg>
