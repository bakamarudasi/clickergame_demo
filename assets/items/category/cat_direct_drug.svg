<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Flask neck -->
  <rect x="28" y="6" width="8" height="14" fill="none" stroke="#3A2410" stroke-width="2.5"/>
  <!-- Stopper -->
  <rect x="26" y="2" width="12" height="6" rx="1" fill="#7A4828" stroke="#3A2410" stroke-width="2"/>
  <!-- Flask body (cone-bottom round) -->
  <path d="M 28 20 L 36 20 L 50 48 Q 52 56 44 56 L 20 56 Q 12 56 14 48 Z"
        fill="#F0E2C2" stroke="#3A2410" stroke-width="2.5"/>
  <!-- Liquid -->
  <path d="M 22 38 L 42 38 L 48 50 Q 50 54 44 54 L 20 54 Q 14 54 16 50 Z"
        fill="#E84A8A" opacity="0.85"/>
  <!-- Bubbles -->
  <circle cx="26" cy="44" r="1.6" fill="#F8C8DC" opacity="0.9"/>
  <circle cx="36" cy="42" r="1.2" fill="#F8C8DC" opacity="0.9"/>
  <circle cx="40" cy="48" r="1.4" fill="#F8C8DC" opacity="0.9"/>
</svg>
