<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Scroll body -->
  <rect x="14" y="12" width="36" height="40" fill="#F4E2B8" stroke="#3A2410" stroke-width="2.5"/>
  <!-- Top scroll roll -->
  <ellipse cx="32" cy="12" rx="18" ry="4" fill="#C9A227" stroke="#3A2410" stroke-width="2"/>
  <!-- Bottom scroll roll -->
  <ellipse cx="32" cy="52" rx="18" ry="4" fill="#C9A227" stroke="#3A2410" stroke-width="2"/>
  <!-- Text lines -->
  <rect x="20" y="20" width="24" height="2" fill="#3A2410"/>
  <rect x="20" y="26" width="20" height="1.6" fill="#5A3416"/>
  <rect x="20" y="32" width="22" height="1.6" fill="#5A3416"/>
  <rect x="20" y="38" width="18" height="1.6" fill="#5A3416"/>
  <rect x="20" y="44" width="22" height="1.6" fill="#5A3416"/>
  <!-- Red seal stamp at bottom corner -->
  <rect x="36" y="42" width="8" height="8" fill="none" stroke="#C24A3A" stroke-width="1.4" transform="rotate(-12 40 46)"/>
</svg>
